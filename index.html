<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>TOS-M Tracker V1.5.9 - Smart Auto Switch</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0b101a; color: #e2e8f0; -webkit-tap-highlight-color: transparent; }
        .boss-card { border: 1px solid #1e293b; transition: all 0.3s ease; position: relative; order: 2; border-radius: 1.5rem; background-color: #0f172a; }
        .boss-card.pinned { border-color: #fbbf24; background-color: #1e1b11; order: 1; }
        .alive-glow { animation: shadow-pulse 1.5s infinite; border-color: #f97316 !important; background-color: rgba(249, 115, 22, 0.08) !important; }
        @keyframes shadow-pulse { 0% { box-shadow: 0 0 0 0px rgba(249, 115, 22, 0.5); } 100% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } }
        .btn-locked { opacity: 0.15; cursor: not-allowed !important; pointer-events: none; filter: grayscale(1); }
        .bg-black-40 { background-color: rgba(0, 0, 0, 0.4); }
        .text-event-orange { color: #f97316 !important; text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
        .filter-btn { border: 1px solid #334155; padding: 0.4rem 0.8rem; border-radius: 12px; font-size: 0.75rem; font-weight: bold; transition: all 0.2s; background: #1e293b; color: #94a3b8; white-space: nowrap; position: relative; }
        .filter-btn.active { background-color: #f59e0b !important; color: #000 !important; border-color: #f59e0b !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .ep-badge { position: absolute; top: -8px; right: -8px; background: #f97316; color: white; font-size: 10px; font-weight: 800; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 2px solid #0b101a; pointer-events: none; z-index: 50; }
        .ch-btn { position: relative; border-radius: 10px; font-size: 11px; font-weight: bold; transition: all 0.2s; border: 1px solid #334155; color: #94a3b8; background: #1e293b; }
        .ch-btn.active { background-color: #f59e0b; color: #000; border-color: #f59e0b; }
        .status-dot { position: absolute; top: -4px; right: -4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #0b101a; display: none; z-index: 10; }
        .status-dot.counting { display: block; background: #3b82f6; box-shadow: 0 0 5px rgba(59, 130, 246, 0.8); }
        .status-dot.alive { display: block; background: #f97316; animation: blink 0.8s infinite; box-shadow: 0 0 8px rgba(249, 115, 22, 1); }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        .log-container { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1.5rem; overflow: hidden; }
        .log-table th { background: #0f172a; color: #94a3b8; font-size: 0.7rem; padding: 0.75rem; }
        .log-table td { padding: 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.8rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-2xl mx-auto text-center mb-6">
        <h1 class="text-3xl font-bold text-white mb-2">🌳 TOS-M Tracker</h1>
        <div id="c-status" class="text-xs text-yellow-500 font-bold uppercase tracking-widest">Disconnected</div>
    </header>

    <div class="max-w-2xl mx-auto mb-6 flex flex-col gap-4">
        <div id="auth-card" class="bg-gray-800 p-4 rounded-3xl border border-gray-700 shadow-xl">
            <div id="input-fields">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs text-yellow-500 font-bold mb-1 uppercase tracking-widest">Server</label>
                        <select id="_grp" onchange="_vld()" class="w-full bg-black-40 border border-gray-600 rounded-xl px-4 py-2 text-sm text-white outline-none">
                            <option value="" disabled selected>เลือกเซิร์ฟเวอร์...</option>
                            <option value="giltine">giltine</option><option value="austeja">austeja</option><option value="zemyna">zemyna</option>
                            <option value="laima">laima</option><option value="vaivora">vaivora</option><option value="ausirine">ausirine</option>
                            <option value="vakarine">vakarine</option><option value="saule">saule</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1 uppercase tracking-widest">Your Name</label>
                        <input type="text" id="_usr" oninput="_vld()" placeholder="Nickname" class="w-full bg-black-40 border border-gray-600 rounded-xl px-4 py-2 text-sm text-white outline-none">
                    </div>
                </div>
                <button id="_svB" onclick="_save()" class="w-full mt-1 bg-blue-600 text-white text-xs py-3 rounded-xl font-bold btn-locked uppercase transition-all">Save & Connect Profile</button>
            </div>
            <div id="locked-fields" class="hidden flex justify-between items-center py-1">
                <div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Status: Connected</div>
                    <div class="text-sm font-bold text-white"><span id="display-usr"></span> @ <span id="display-grp" class="text-yellow-500 font-black"></span></div>
                </div>
                <button onclick="_logout()" class="text-[10px] bg-red-900/20 text-red-400 border border-red-900/50 px-3 py-2 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-all uppercase">Logout</button>
            </div>
        </div>
        <div class="flex flex-wrap gap-2 justify-start py-2" id="ep-filters">
            <button onclick="_filterEP('all')" class="filter-btn active" id="f-all">All EP <span id="badge-all" class="ep-badge hidden">0</span></button>
        </div>
    </div>

    <div id="b-cont" class="max-w-2xl mx-auto flex flex-col gap-6 mb-10"></div>

    <div class="max-w-2xl mx-auto mb-20">
        <h2 class="text-sm font-bold text-yellow-500 uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">history</span> Recent Records (10)
        </h2>
        <div class="log-container">
            <table class="w-full text-left log-table">
                <thead><tr><th>Boss Name</th><th>CH</th><th>By</th><th>Time</th></tr></thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 1. SYSTEM: AUTO FORCE RELOAD LOGIC ---
        const APP_VERSION = "1.5.9"; 
        (function checkVersion() {
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion !== APP_VERSION) {
                localStorage.setItem('app_version', APP_VERSION);
                window.location.href = window.location.pathname + '?v=' + APP_VERSION;
            }
        })();

        // --- 2. DATABASE CONFIG ---
        const _0x1f2a = { databaseURL: "https://tos-boss-tracker-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(_0x1f2a);
        const _db = firebase.database();
        
        let _bsData = [], _pnBs = JSON.parse(localStorage.getItem('tos_pinned_bosses') || '[]');
        let _fbD = {}, _fbLogs = {}, _isE = false, _currG = "", _curEP = "all", _srvOfst = 0;
        let _selectedCh = {};
        let _webhooks = {};
        let _isManualCh = {}; // เก็บสถานะว่า User กดเลือก CH เองหรือไม่

        _db.ref('config/webhooks').once('value', s => { _webhooks = s.val() || {}; });
        _db.ref(".info/serverTimeOffset").on("value", (s) => { _srvOfst = s.val() || 0; });

        function _filterEP(ep) {
            _curEP = ep;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`f-${ep}`).classList.add('active');
            _rend();
        }

        function _vld() {
            const g = document.getElementById('_grp').value, u = document.getElementById('_usr').value.trim();
            if (localStorage.getItem('tos_locked') === 'true') return;
            document.getElementById('_svB').classList.toggle('btn-locked', !( (g && u) || u === "/testadmin" ));
        }

        async function _init() {
            const filterCont = document.getElementById('ep-filters');
            for(let i=1; i<=11; i++) {
                if(!document.getElementById(`f-${i}`)) {
                    filterCont.innerHTML += `<button onclick="_filterEP('${i}')" class="filter-btn" id="f-${i}">EP ${i} <span id="badge-${i}" class="ep-badge hidden">0</span></button>`;
                }
            }
            try {
                const r = await fetch('bosses.json?v=' + Date.now());
                _bsData = await r.json();
                const sG = localStorage.getItem('tos_group_name'), sN = localStorage.getItem('tos_uret_name'), isL = localStorage.getItem('tos_locked') === 'true';
                if (isL && sG) { 
                    _currG = sG; _isE = true; 
                    document.getElementById('input-fields').classList.add('hidden'); 
                    document.getElementById('locked-fields').classList.remove('hidden'); 
                    document.getElementById('display-usr').innerText = sN; 
                    document.getElementById('display-grp').innerText = sG; 
                    _sync(sG); 
                }
                _rend(); _vld(); _loop();
            } catch (e) { console.warn(e); }
        }

        function _rend() {
            const c = document.getElementById('b-cont');
            const filtered = _bsData.filter(b => _pnBs.includes(`card-${b.id}`) || (_curEP === "all" || String(b.ep) === _curEP));
            
            c.innerHTML = filtered.map(b => {
                const p = _pnBs.includes(`card-${b.id}`), l = _isE ? "" : "btn-locked";
                const curCh = _selectedCh[b.id] || 1;
                const elKey = (b.element || "").toLowerCase();
                const elConfig = {
                    'fire': { border: '#ff4d4d', text: '#ff9999', bg: 'rgba(255, 0, 0, 0.15)', label: 'ไฟ' },
                    'earth': { border: '#b35900', text: '#ffb366', bg: 'rgba(139, 69, 19, 0.2)', label: 'ดิน' },
                    'ice': { border: '#3399ff', text: '#99ccff', bg: 'rgba(0, 255, 255, 0.15)', label: 'น้ำแข็ง' },
                    'lightning': { border: '#00e6e6', text: '#80ffff', bg: 'rgba(0, 255, 255, 0.15)', label: 'สายฟ้า' },
                    'light': { border: '#ffd700', text: '#fff2a3', bg: 'rgba(255, 215, 0, 0.15)', label: 'แสงศักดิ์สิทธิ์' },
                    'dark': { border: '#bf00ff', text: '#e699ff', bg: 'rgba(148, 0, 211, 0.2)', label: 'ความมืด' }
                }[elKey] || { border: '#9ca3af', text: '#f3f4f6', bg: 'rgba(156, 163, 175, 0.1)', label: b.element };

                return `<div class="boss-card p-6 flex flex-col md:flex-row gap-6 ${p?'pinned':''}" id="card-${b.id}">
                    <div class="relative w-full md:w-36 h-36 flex-shrink-0 mx-auto">
                        <img src="${b.img}" class="w-full h-full object-cover rounded-2xl border border-gray-800" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="absolute -bottom-2 right-0 bg-yellow-600 text-black text-[10px] font-black px-2 py-0.5 rounded-lg z-10">EP ${b.ep}</div>
                        <button onclick="_pin('card-${b.id}')" class="absolute -top-2 -left-2 bg-gray-800 rounded-full p-1 border border-gray-700 z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ${p?'text-yellow-400 fill-current':'text-gray-600'}" viewBox="0 0 24 24" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        </button>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-2xl font-bold text-white leading-tight">${b.name} <span class="text-xl text-yellow-400 font-black ml-1">LV.${b.lv}</span></h3>
                                <div class="text-[10px] text-red-500 font-bold mt-1 uppercase">📍 ${b.map}${b.map_ext ? ' (' + b.map_ext + ')' : ''}</div>
                                <div class="flex gap-1.5 mt-2">
                                    <div class="px-2 py-0.5 rounded border" style="border-color: ${elConfig.border}; background-color: ${elConfig.bg};">
                                        <span class="text-[9px] font-bold uppercase tracking-wider" style="color: ${elConfig.text};">${elConfig.label}</span>
                                    </div>
                                    <div class="px-2 py-0.5 rounded border" style="border-color: #5c2a1a; background-color: rgba(92, 42, 26, 0.1);">
                                        <span class="text-[9px] font-bold uppercase tracking-wider" style="color: #d2b48c;">${b.race}</span>
                                    </div>
                                </div>
                                <div id="log-${b.id}" class="text-[11px] text-blue-400 mt-3 italic font-bold">CH 1: No Data</div>
                            </div>
                            <button onclick="_rst('${b.id}')" class="text-gray-600 hover:text-red-500 ${l}"><span class="material-symbols-outlined">close</span></button>
                        </div>
                        <div class="mt-4 bg-black rounded-2xl py-3 px-2 text-center border border-gray-800 shadow-inner">
                            <div id="tmr-${b.id}" class="text-4xl text-yellow-400 font-mono">READY</div>
                            <div id="st-${b.id}" class="text-[10px] text-green-500 font-black mt-1 uppercase">Ready to Hunt</div>
                        </div>
                        <div class="mt-4">
                            <div class="flex gap-1 mb-2 justify-center">
                                ${[1, 2, 3].map(ch => `
                                    <button id="btn-ch-${b.id}-${ch}" onclick="_setCh('${b.id}', ${ch})" class="ch-btn px-4 py-1 ${ch===curCh?'active':''} ${l}">
                                        CH ${ch}
                                        <span id="dot-${b.id}-${ch}" class="status-dot"></span>
                                    </button>`).join('')}
                            </div>
                            <div class="grid grid-cols-1 gap-2">
                                <button onclick="_chk('${b.id}', ${b.respawn})" class="bg-blue-700 py-3 rounded-2xl text-xs font-bold text-white shadow-lg ${l}">เพิ่งตาย (${b.respawn} น.)</button>
                                <div class="flex gap-2">
                                    <input type="number" id="in-${b.id}" placeholder="ระบุนาที..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-xs text-white text-center ${l}">
                                    <button onclick="_mchk('${b.id}')" class="bg-purple-600 px-5 rounded-xl text-xs font-bold text-white ${l}">เริ่มนับ</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function _setCh(id, ch) {
            _isManualCh[id] = true; // เมื่อกดเอง จะหยุด Auto-Switch จนกว่าจะรีโหลดหน้าใหม่
            _selectedCh[id] = ch;
            [1, 2, 3].forEach(i => {
                const btn = document.getElementById(`btn-ch-${id}-${i}`);
                if (btn) btn.classList.toggle('active', i === ch);
            });
            _updT(id);
        }

        function _sync(g) {
            _db.ref(`groups/${g}/timers`).on('value', s => { _fbD = s.val() || {}; });
            _db.ref(`groups/${g}/logs`).orderByChild('timestamp').limitToLast(10).on('value', s => { _fbLogs = s.val() || {}; _updLog(); });
            document.getElementById('c-status').innerText = `● Connected: ${g}`;
            document.getElementById('c-status').className = "text-xs text-green-500 font-bold uppercase tracking-widest";
        }

        function _updLog() {
            const body = document.getElementById('log-body');
            const sorted = Object.entries(_fbLogs).map(([k,v])=>v).sort((a,b)=>b.timestamp-a.timestamp);
            body.innerHTML = sorted.length ? sorted.map(i => `<tr><td class="font-bold text-white">${i.bossName}</td><td class="text-yellow-500 font-bold italic">CH ${i.ch}</td><td class="text-blue-400 font-bold">${i.user}</td><td class="text-gray-400 font-mono text-[10px]">${i.time}</td></tr>`).join('') : '<tr><td colspan="4" class="text-center py-10 text-gray-600 italic">No Recent Records</td></tr>';
        }

        function _updT(id) {
            const now = Date.now() + _srvOfst;
            let ch = _selectedCh[id] || 1;
            const tmE = document.getElementById(`tmr-${id}`), stE = document.getElementById(`st-${id}`), lgE = document.getElementById(`log-${id}`);
            
            if (!tmE) return;
            let aliveCh = null;

            // 1. ตรวจสอบสถานะทุก CH
            [1,2,3].forEach(cNum => {
                const dot = document.getElementById(`dot-${id}-${cNum}`);
                const ct = _fbD[`${id}_ch${cNum}`];
                if(ct && ct.expireTime) {
                    const rSec = (ct.expireTime - now) / 1000;
                    const isAlive = rSec <= 0;
                    if(dot) dot.className = isAlive ? "status-dot alive" : "status-dot counting";
                    if (isAlive) aliveCh = cNum; // เก็บ CH ที่เกิดล่าสุดไว้
                    if (rSec < -1200 && _isE) { _db.ref(`groups/${_currG}/timers/${id}_ch${cNum}`).remove(); }
                } else { if(dot) dot.className = "status-dot"; }
            });

            // 2. AUTO-SWITCH: ถ้ามีบอสเกิด และผู้ใช้ยังไม่ได้เลือก CH เอง ให้เด้งไป CH นั้น
            if (aliveCh && !_isManualCh[id] && ch !== aliveCh) {
                _selectedCh[id] = aliveCh;
                ch = aliveCh;
                [1, 2, 3].forEach(i => {
                    const btn = document.getElementById(`btn-ch-${id}-${i}`);
                    if (btn) btn.classList.toggle('active', i === ch);
                });
            }

            // 3. แสดงข้อมูล
            const t = _fbD[`${id}_ch${ch}`];
            if (t && t.expireTime) {
                const r = Math.floor((t.expireTime - now) / 1000);
                lgE.innerText = `CH ${ch}: By ${t.user} (${t.time})`;
                if (r > 0) {
                    let h=Math.floor(r/3600), m=Math.floor((r%3600)/60), s=r%60;
                    tmE.innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    tmE.className = "text-4xl text-yellow-400 font-mono";
                    stE.innerText = `CH ${ch} - COUNTING DOWN...`; stE.className = "text-[10px] text-gray-500 font-black mt-1 uppercase";
                } else {
                    tmE.innerText = `CH ${ch} ALIVE! ⚔️`; tmE.className = "text-3xl text-event-orange font-bold animate-pulse";
                    stE.innerText = "ตีมอนปลุกบอส!"; stE.className = "text-[10px] text-event-orange font-black mt-1 uppercase";
                    if (!t.notified && _isE) { 
                        _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).update({ notified: true }); 
                        _post(id, "ALIVE", ch); 
                    }
                }
            } else {
                tmE.innerText = "READY"; tmE.className = "text-4xl text-yellow-400 font-mono";
                stE.innerText = `CH ${ch} - Ready to Hunt`; stE.className = "text-[10px] text-green-500 font-black mt-1 uppercase";
                lgE.innerText = `CH ${ch}: No Data`;
            }
        }

        function _loop() {
            setInterval(() => {
                const now = Date.now() + _srvOfst;
                const epCounts = { all: 0 };
                _bsData.forEach(b => {
                    _updT(b.id);
                    const card = document.getElementById(`card-${b.id}`);
                    let hasAnyAlive = false;
                    [1, 2, 3].forEach(cNum => {
                        const timer = _fbD[`${b.id}_ch${cNum}`];
                        if (timer && (timer.expireTime - now) <= 0) { hasAnyAlive = true; }
                    });
                    if(card) card.classList.toggle('alive-glow', hasAnyAlive);
                    if(hasAnyAlive) {
                        epCounts.all++;
                        if(b.ep) epCounts[b.ep] = (epCounts[b.ep] || 0) + 1;
                    }
                });
                Object.keys(epCounts).forEach(k => {
                    const badge = document.getElementById(`badge-${k}`);
                    if(badge) {
                        badge.innerText = epCounts[k];
                        badge.classList.toggle('hidden', epCounts[k] === 0);
                    }
                });
            }, 1000);
        }

        function _chk(id, m) {
            if (!_isE) return;
            const ch = _selectedCh[id] || 1;
            const now = Date.now() + _srvOfst;
            const existingTimer = _fbD[`${id}_ch${ch}`];
            if (existingTimer && existingTimer.expireTime > now) {
                const b = _bsData.find(x => x.id === id);
                if (!confirm(`⚠️ บอส [${b.name}] CH ${ch} กำลังนับถอยหลังอยู่\nต้องการตั้งเวลาใหม่ทับของเดิมใช่หรือไม่?`)) return;
            }
            const n = localStorage.getItem('tos_uret_name'), b = _bsData.find(x=>x.id===id);
            const timeStr = new Date(now).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
            _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).set({ expireTime: now+(m*60*1000), user: n, time: timeStr, notified: false, ch: ch });
            _db.ref(`groups/${_currG}/logs`).push({ bossName: b.name, ch: ch, user: n, time: timeStr, timestamp: now });
        }

        function _mchk(id) { 
            const v = document.getElementById(`in-${id}`).value; 
            if(v){ _chk(id, parseFloat(v)); document.getElementById(`in-${id}`).value=''; } 
        }

        function _rst(id) { const ch = _selectedCh[id] || 1; if(_isE && confirm(`Reset CH ${ch} ของบอสตัวนี้?`)) { 
            _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).remove(); 
            _post(id, "RESET", ch);
        } }
        function _pin(id) { const i = _pnBs.indexOf(id); i>-1 ? _pnBs.splice(i,1) : _pnBs.push(id); localStorage.setItem('tos_pinned_bosses', JSON.stringify(_pnBs)); _rend(); }
        
        function _save() {
