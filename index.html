        .btn-locked { opacity: 0.4; cursor: not-allowed !important; pointer-events: none; filter: grayscale(0.5); }

        .ch-btn.active { background-color: #f59e0b; color: #000; border-color: #f59e0b; }
        
        .stage-btn { font-size: 12px; font-weight: bold; border: 2px solid #334155; background: #1e293b; color: #94a3b8; border-radius: 10px; padding: 8px 0; transition: all 0.2s; flex: 1; min-width: 0; text-align: center; }

        .stage-btn.active-2 { background: #3b82f6; color: white; border-color: #60a5fa; }
        .stage-btn.active-3 { background: #8b5cf6; color: white; border-color: #a78bfa; }
        .stage-btn.active-4 { background: #ec4899; color: white; border-color: #f472b6; }
        .stage-btn.active-5 { background: #f97316; color: white; border-color: #fb923c; animation: pulse 1s infinite; }
        .spawned-btn { background: #065f46; color: #34d399; border: 2px solid #059669; font-size: 12px; }

        .spawned-btn.is-spawned { background: #dc2626; color: white; border-color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .status-dot { position: absolute; top: -4px; right: -4px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid #0b101a; display: none; z-index: 10; }
        .status-dot.counting { display: block; background: #3b82f6; box-shadow: 0 0 5px rgba(59, 130, 246, 0.8); }
        .status-dot.alive { display: block; background: #f97316; animation: blink 0.8s infinite; box-shadow: 0 0 8px rgba(249, 115, 22, 1); }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
        .log-container { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1.5rem; overflow: hidden; }
        .log-table th { background: #0f172a; color: #94a3b8; font-size: 0.7rem; padding: 0.75rem; }
        .log-table td { padding: 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.8rem; }
        .hidden { display: none !important; }
        .medal-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 1rem; transition: transform 0.2s; }
        .medal-gold { border-color: #fbbf24; background: linear-gradient(135deg, #2d240b 0%, #0f172a 100%); box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
        #backToTop { transition: all 0.3s ease; transform: translateY(20px); opacity: 0; pointer-events: none; }
        #backToTop.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        @keyframes highlight-flash { 0%, 100% { box-shadow: 0 0 0 0px rgba(255, 255, 255, 0); } 25% { box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.9); } 50% { box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.4); } 75% { box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.9); } }
        .boss-card.highlight-flash { animation: highlight-flash 1.5s ease-out; border-color: #ffffff !important; }

        /* Alive Panel */
        #alive-panel { position: fixed; top: 50%; right: 0; transform: translateY(-50%); z-index: 100; max-height: 80vh; width: 250px; transition: width 0.3s ease; }
        #alive-panel .panel-inner { background: rgba(15, 23, 42, 0.95); border: 2px solid #f97316; border-right: none; border-radius: 16px 0 0 16px; backdrop-filter: blur(10px); overflow: hidden; height: 100%; }
        #alive-panel .panel-header { background: #f97316; color: #000; font-size: 13px; font-weight: 900; padding: 10px 12px; text-align: center; white-space: nowrap; overflow: hidden; }
        #alive-panel .alive-list { overflow-y: auto; max-height: calc(80vh - 40px); padding: 4px; }
        #alive-panel .alive-item { display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 10px; cursor: pointer; transition: background 0.2s; white-space: nowrap; overflow: hidden; }
        #alive-panel .alive-item:hover { background: rgba(249, 115, 22, 0.2); }
        #alive-panel .alive-item.high-stage { animation: alive-highlight-flash 1.2s infinite; border: 1.5px solid rgba(255,255,255,0.7); }
        @keyframes alive-highlight-flash { 0%, 100% { box-shadow: 0 0 0 0px rgba(255,255,255,0); background: rgba(255,255,255,0.03); } 50% { box-shadow: 0 0 8px 2px rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); } }
        #alive-panel .alive-item img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; border: 2px solid #f97316; flex-shrink: 0; }
        #alive-panel .alive-item .info { overflow: hidden; min-width: 0; }
        #alive-panel .alive-item .boss-name { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #alive-panel .alive-item .boss-detail { font-size: 15px; color: #f97316; font-weight: 700; }
        #alive-panel .no-alive { text-align: center; padding: 16px 8px; color: #475569; font-size: 12px; font-weight: bold; }
        #alive-panel .alive-count { background: #dc2626; color: white; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; position: absolute; top: -6px; left: -6px; border: 2px solid #0b101a; }

        /* Group Chat */
        #chat-panel { position: fixed; bottom: 20px; left: 20px; z-index: 100; width: 320px; max-height: 420px; display: flex; flex-direction: column; transition: all 0.3s ease; }
        #chat-panel.minimized { max-height: 44px; overflow: hidden; }
        #chat-panel .chat-inner { background: rgba(15, 23, 42, 0.97); border: 2px solid #3b82f6; border-radius: 16px; backdrop-filter: blur(10px); overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        #chat-panel .chat-header { background: #3b82f6; color: #fff; font-size: 13px; font-weight: 900; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        #chat-panel .chat-header .badge { background: #dc2626; color: white; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-left: 6px; display: none; }
        #chat-panel .chat-messages { flex: 1; overflow-y: auto; padding: 8px; max-height: 280px; min-height: 120px; display: flex; flex-direction: column; gap: 4px; }
        #chat-panel .chat-msg { font-size: 12px; line-height: 1.4; padding: 4px 8px; border-radius: 8px; word-break: break-word; }
        #chat-panel .chat-msg .msg-user { font-weight: 700; color: #60a5fa; font-size: 11px; }
        #chat-panel .chat-msg .msg-time { color: #475569; font-size: 9px; margin-left: 6px; }
        #chat-panel .chat-msg .msg-text { color: #e2e8f0; }
        #chat-panel .chat-msg.self { background: rgba(59, 130, 246, 0.15); }
        #chat-panel .chat-msg.other { background: rgba(30, 41, 59, 0.6); }
        #chat-panel .chat-input-area { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #1e293b; }
        #chat-panel .chat-input-area input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 8px 12px; color: #fff; font-size: 12px; outline: none; font-family: 'Kanit', sans-serif; }
        #chat-panel .chat-input-area input::placeholder { color: #475569; }
        #chat-panel .chat-input-area button { background: #3b82f6; color: white; border: none; border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Kanit', sans-serif; }
        #chat-panel .chat-input-area button:hover { background: #2563eb; }
        #chat-panel .chat-no-msg { text-align: center; padding: 24px 8px; color: #475569; font-size: 12px; font-weight: bold; }
        @media (max-width: 640px) { #chat-panel { width: calc(100vw - 40px); left: 20px; bottom: 80px; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-7xl mx-auto text-center mb-6">
        <h1 class="text-3xl font-bold text-white mb-2">🌳 TOS-M Tracker</h1>
        <div id="c-status" class="text-xs text-yellow-500 font-bold uppercase tracking-widest">Disconnected</div>
    </header>

    <div class="max-w-7xl mx-auto mb-6 flex flex-col gap-4">
        <div id="auth-card" class="bg-gray-800 p-4 rounded-3xl border border-gray-700 shadow-xl">
            <div id="input-fields">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-xs text-yellow-500 font-bold mb-1 uppercase tracking-widest">Server</label>
                        <select id="_grp" onchange="_vld()" class="w-full bg-black-40 border border-gray-600 rounded-xl px-4 py-2 text-sm text-white outline-none">
                            <option value="" disabled selected>เลือกเซิร์ฟเวอร์...</option>
                            <option value="giltine">GILTINE</option><option value="saule">SAULE</option>
                            <option value="austeja">AUSTEJA</option><option value="zemyna">ZEMYNA</option>
                            <option value="laima">LAIMA</option><option value="vaivora">VAIVORA</option>
                            <option value="ausirine">AUSIRINE</option><option value="vakarine">VAKARINE</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-bold mb-1 uppercase tracking-widest">Your Name</label>
                        <input type="text" id="_usr" oninput="_vld()" placeholder="Nickname" class="w-full bg-black-40 border border-gray-600 rounded-xl px-4 py-2 text-sm text-white outline-none">
                    </div>
                </div>
                <button id="_svB" onclick="_save()" class="w-full mt-1 bg-blue-600 text-white text-xs py-3 rounded-xl font-bold btn-locked uppercase transition-all">Save & Connect Profile</button>
            </div>
            <div id="locked-fields" class="hidden flex justify-between items-center py-1">
                <div>
                    <div class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">Status: Connected</div>

                </div>
                <button onclick="_logout()" class="text-[10px] bg-red-900/20 text-red-400 border border-red-900/50 px-3 py-2 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-all uppercase">Logout</button>
            </div>
        </div>

            <button onclick="_filterEP('all')" class="filter-btn active" id="f-all">All EP <span id="badge-all" class="ep-badge hidden">0</span></button>
        </div>
    </div>

    <div id="b-cont" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-10"></div>

    <div class="max-w-7xl mx-auto mb-10">
        <h2 class="text-sm font-bold text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">workspace_premium</span> Top Contributors
        </h2>
        <div id="hof-medal-list" class="grid grid-cols-2 md:grid-cols-4 gap-3">
             <div class="col-span-full text-center py-4 text-gray-500 text-xs italic">กำลังรอข้อมูลสถิติ...</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-20">
        <h2 class="text-sm font-bold text-yellow-500 uppercase tracking-widest mb-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">history</span> Recent Records (10)
        </h2>
        <div class="log-container">
            <table class="w-full text-left log-table">
                <thead><tr><th>Boss Name</th><th>CH</th><th>By</th><th>Time</th></tr></thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
    </div>

    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-6 right-6 w-12 h-12 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center z-50 border border-blue-400 focus:outline-none">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>

    <!-- Alive Boss Panel -->
    <div id="alive-panel" class="expanded">
        <div class="panel-inner relative">
            <span id="alive-count-badge" class="alive-count hidden">0</span>
            <div class="panel-header">⚠️ ALIVE</div>
            <div class="alive-list" id="alive-list">
                <div class="no-alive">ไม่มีบอส ALIVE</div>
            </div>

    </div>

    <!-- Group Chat Panel -->
    <div id="chat-panel" class="minimized">
        <div class="chat-inner">
            <div class="chat-header" onclick="_toggleChat()">
                <span>💬 แชทรวม <span id="chat-badge" class="badge"></span></span>

            </div>

                <div class="chat-no-msg">ยังไม่มีข้อความ</div>
            </div>
            <div class="chat-input-area" id="chat-input-area">
                <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." maxlength="200" onkeydown="if(event.key==='Enter')_sendChat()">
                <button onclick="_sendChat()">ส่ง</button>
            </div>
        </div>
    </div>

    <script>
        const APP_VERSION = "1.9.1"; 
        const _0x1f2a = { databaseURL: "https://ocean-boss-track-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(_0x1f2a);
        const _db = firebase.database();
        
        let _bsData = [], _pnBs = JSON.parse(localStorage.getItem('tos_pinned_bosses') || '[]');
        let _fbD = {}, _fbLogs = {}, _isE = false, _currG = "", _curEP = "all", _srvOfst = 0;
        let _selectedCh = {}, _hasAutoSwitched = {}; 
        let _webhooks = {};
        


        _db.ref('config/webhooks').once('value', s => { _webhooks = s.val() || {}; });
        _db.ref(".info/serverTimeOffset").on("value", (s) => { _srvOfst = s.val() || 0; });

        function _filterEP(ep) {
            _curEP = ep;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`f-${ep}`).classList.add('active');
            _rend();
        }

        function _vld() {
            const g = document.getElementById('_grp').value, u = document.getElementById('_usr').value.trim();
            if (localStorage.getItem('tos_locked') === 'true') return;
            document.getElementById('_svB').classList.toggle('btn-locked', !( (g && u) || u === "/testadmin" ));
        }

        async function _init() {
            const filterCont = document.getElementById('ep-filters');
            for(let i=1; i<=13; i++) {
                if(!document.getElementById(`f-${i}`)) {
                    filterCont.innerHTML += `<button onclick="_filterEP('${i}')" class="filter-btn" id="f-${i}">EP ${i} <span id="badge-${i}" class="ep-badge hidden">0</span></button>`;
                }
            }
            try {
                const r = await fetch('bosses.json?v=' + Date.now());
                _bsData = await r.json();
                const sG = localStorage.getItem('tos_group_name'), sN = localStorage.getItem('tos_uret_name'), isL = localStorage.getItem('tos_locked') === 'true';
                if (isL && sG) { 
                    _currG = sG; _isE = true; 
                    document.getElementById('input-fields').classList.add('hidden'); 
                    document.getElementById('locked-fields').classList.remove('hidden'); 
                    document.getElementById('display-usr').innerText = sN; 
                    document.getElementById('display-grp').innerText = sG.toUpperCase(); 
                    _sync(sG); 
                }
                _rend(); _vld(); _loop();
            } catch (e) { console.warn(e); }
        }

        function _rend() {
            const c = document.getElementById('b-cont');
            const filtered = _bsData.filter(b => _pnBs.includes(`card-${b.id}`) || (_curEP === "all" || String(b.ep) === _curEP));
            
            c.innerHTML = filtered.map(b => {
                const p = _pnBs.includes(`card-${b.id}`), l = _isE ? "" : "btn-locked";
                const curCh = _selectedCh[b.id] || 1;
                
                const maxCh = (b.ep === 13 || b.ep === "13") ? 5 : 3;
                const chButtons = [];
                for(let i=1; i<=maxCh; i++) {
                    chButtons.push(`<button id="btn-ch-${b.id}-${i}" onclick="_setCh('${b.id}', ${i})" class="ch-btn px-2 py-1 ${i===curCh?'active':''} ${l}">CH ${i}<span id="dot-${b.id}-${i}" class="status-dot"></span></button>`);
                }

                const elKey = (b.element || "").toLowerCase();
                const elConfig = {
                    'fire': { border: '#ff4d4d', text: '#ff9999', bg: 'rgba(255, 0, 0, 0.15)', label: 'ไฟ' },
                    'earth': { border: '#b35900', text: '#ffb366', bg: 'rgba(139, 69, 19, 0.2)', label: 'ดิน' },
                    'ice': { border: '#3399ff', text: '#99ccff', bg: 'rgba(0, 255, 255, 0.15)', label: 'น้ำแข็ง' },
                    'lightning': { border: '#00e6e6', text: '#80ffff', bg: 'rgba(0, 255, 255, 0.15)', label: 'สายฟ้า' },
                    'light': { border: '#ffd700', text: '#fff2a3', bg: 'rgba(255, 215, 0, 0.15)', label: 'แสงศักดิ์สิทธิ์' },
                    'dark': { border: '#bf00ff', text: '#e699ff', bg: 'rgba(148, 0, 211, 0.2)', label: 'ความมืด' }
                }[elKey] || { border: '#9ca3af', text: '#f3f4f6', bg: 'rgba(156, 163, 175, 0.1)', label: b.element };

                return `<div class="boss-card p-4 flex flex-col gap-3 ${p?'pinned':''}" id="card-${b.id}">
                    <div class="relative w-full h-28 flex-shrink-0">
                        <img src="${b.img}" class="w-full h-full object-cover rounded-xl border border-gray-800" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="absolute -bottom-2 right-1 bg-yellow-600 text-black text-[9px] font-black px-1.5 py-0.5 rounded-lg z-10">EP ${b.ep}</div>
                        <button onclick="_pin('card-${b.id}')" class="absolute -top-2 -left-2 bg-gray-800 rounded-full p-0.5 border border-gray-700 z-10">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ${p?'text-yellow-400 fill-current':'text-gray-600'}" viewBox="0 0 24 24" stroke="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        </button>
                        <button onclick="_rst('${b.id}')" class="absolute -top-2 -right-2 bg-gray-800 rounded-full p-0.5 border border-gray-700 z-10 text-gray-600 hover:text-red-500 ${l}"><span class="material-symbols-outlined" style="font-size:14px">close</span></button>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-sm font-bold text-white leading-tight truncate">${b.name}</h3>
                        <div class="flex items-center gap-1 mt-0.5">
                            <span class="text-[10px] text-yellow-400 font-black">LV.${b.lv}</span>
                            <span class="text-[9px] text-red-500 font-bold truncate">📍${b.map}</span>
                        </div>
                        <div class="flex gap-1 mt-1">
                            <div class="px-1.5 py-0 rounded border" style="border-color: ${elConfig.border}; background-color: ${elConfig.bg};"><span class="text-[8px] font-bold uppercase" style="color: ${elConfig.text};">${elConfig.label}</span></div>
                            <div class="px-1.5 py-0 rounded border" style="border-color: #5c2a1a; background-color: rgba(92, 42, 26, 0.1);"><span class="text-[8px] font-bold uppercase" style="color: #d2b48c;">${b.race}</span></div>
                        </div>

        }

        function _setCh(id, ch) {
            _selectedCh[id] = ch;
            _hasAutoSwitched[id] = true; 
            const b = _bsData.find(x => x.id === id);
            const maxCh = (b.ep === 13 || b.ep === "13") ? 5 : 3;
            for(let i=1; i<=maxCh; i++) {
                const btn = document.getElementById(`btn-ch-${id}-${i}`);
                if (btn) btn.classList.toggle('active', i === ch);
            }
            _updT(id);
        }

        function _setStage(id, stage) {
            if (!_isE) return;
            const ch = _selectedCh[id] || 1;
            const n = localStorage.getItem('tos_uret_name');
            const b = _bsData.find(x => x.id === id);
            const now = Date.now() + _srvOfst;
            const currentTimer = _fbD[`${id}_ch${ch}`];

            // ถ้ายังไม่มี timer ให้สร้างใหม่โดยตั้ง expireTime = now (alive ทันที)
            if (!currentTimer) {
                const timeStr = new Date(now).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).set({
                    expireTime: now, user: n, time: timeStr, notified: false, ch: ch,
                    stage: stage, stage_by: n, last_update: now
                });
                if (stage === 5) {
                    _db.ref(`groups/${_currG}/logs`).push({ bossName: b.name + " (SPAWNED)", ch: ch, user: n, time: timeStr, timestamp: now });
                    _post(id, "BOSS_SPAWN", ch);
                }
                return;
            }
            
            let updateData = { stage: stage, stage_by: n, last_update: now };

            if (stage === 5) {
                const timeStr = new Date(now).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                _db.ref(`groups/${_currG}/logs`).push({
                    bossName: b.name + " (SPAWNED)",
                    ch: ch, user: n, time: timeStr, timestamp: now
                });
                _post(id, "BOSS_SPAWN", ch);
            }

            _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).update(updateData);
        }

        function _markSpawned(id) {
            if (!_isE) return;
            const ch = _selectedCh[id] || 1;
            const n = localStorage.getItem('tos_uret_name');
            const b = _bsData.find(x => x.id === id);
            const now = Date.now() + _srvOfst;
            const currentTimer = _fbD[`${id}_ch${ch}`];

            if (currentTimer && currentTimer.spawned) {
                alert(`⚠️ บอสนี้ถูกมาร์คว่าเกิดแล้ว โดย ${currentTimer.spawned_by || 'Unknown'}`);
                return;
            }

            if (!confirm(`🎯 ยืนยัน: บอส [${b.name}] CH ${ch} เกิดแล้ว?`)) return;

            const timeStr = new Date(now).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            const updateData = {
                spawned: true,
                spawned_by: n,
                spawned_time: timeStr,
                stage: 5,
                stage_by: n,
                last_update: now
            };
            // ถ้ายังไม่มี timer ให้สร้างใหม่
            if (!currentTimer) {
                updateData.expireTime = now;
                updateData.user = n;
                updateData.time = timeStr;
                updateData.notified = false;
                updateData.ch = ch;
                _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).set(updateData);
            } else {
                _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).update(updateData);
            }
            _db.ref(`groups/${_currG}/logs`).push({
                bossName: b.name + " (เกิดแล้ว!)",
                ch: ch, user: n, time: timeStr, timestamp: now
            });
            _post(id, "BOSS_SPAWN", ch);
        }

        function _sync(g) {
            _db.ref(`groups/${g}/timers`).on('value', s => { _fbD = s.val() || {}; });
            _db.ref(`groups/${g}/logs`).on('value', s => { _fbLogs = s.val() || {}; _updLog(); _updMedals(); });
            document.getElementById('c-status').innerText = `● Connected: ${g.toUpperCase()}`;
            document.getElementById('c-status').className = "text-xs text-green-500 font-bold uppercase tracking-widest";
            _initChat();
        }

        function _updMedals() {
            const counts = {};
            Object.values(_fbLogs).forEach(log => { if (log.user) counts[log.user] = (counts[log.user] || 0) + 1; });
            const sorted = Object.entries(counts).sort(([,a], [,b]) => b - a).slice(0, 4);
            const medalCont = document.getElementById('hof-medal-list');
            if (sorted.length === 0) { medalCont.innerHTML = `<div class="col-span-full text-center py-4 text-gray-500 text-xs italic">ยังไม่มีข้อมูลสถิติ...</div>`; return; }
            const icons = ['🥇', '🥈', '🥉', '🎖️'];
            medalCont.innerHTML = sorted.map(([name, count], i) => `<div class="medal-card p-4 flex flex-col items-center justify-center text-center ${i===0?'medal-gold':''}"><div class="text-3xl mb-1">${icons[i]}</div><div class="text-[11px] font-bold text-white truncate w-full uppercase tracking-tighter">${name}</div><div class="text-[10px] text-blue-400 font-black mt-1">${count} RECORDS</div></div>`).join('');
        }

        function _updLog() {
            const body = document.getElementById('log-body');
            const sorted = Object.entries(_fbLogs).map(([k,v])=>v).sort((a,b)=>b.timestamp-a.timestamp).slice(0, 10);
            body.innerHTML = sorted.length ? sorted.map(i => `<tr><td class="font-bold text-white">${i.bossName}</td><td class="text-yellow-500 font-bold italic">CH ${i.ch}</td><td class="text-blue-400 font-bold">${i.user}</td><td class="text-gray-400 font-mono text-[10px]">${i.time}</td></tr>`).join('') : '<tr><td colspan="4" class="text-center py-10 text-gray-600 italic">No Recent Records</td></tr>';
        }

        function _updT(id) {
            const now = Date.now() + _srvOfst;
            let currentCh = _selectedCh[id] || 1;
            const b = _bsData.find(x => x.id === id);
            const maxCh = (b.ep === 13 || b.ep === "13") ? 5 : 3;
            const inputEl = document.getElementById(`in-${id}`);
            const isFocusing = (inputEl && document.activeElement === inputEl);
            let aliveCh = null;

            for(let cNum=1; cNum<=maxCh; cNum++) {
                const dot = document.getElementById(`dot-${id}-${cNum}`);
                const ct = _fbD[`${id}_ch${cNum}`];
                if(ct) {
                    const rSec = (ct.expireTime - now) / 1000;
                    if (dot) {
                        if (rSec <= 0) { dot.className = "status-dot alive"; if (aliveCh === null) aliveCh = cNum; } 
                        else { dot.className = "status-dot counting"; }
                    }
                    if (_isE && (now - (ct.last_update || ct.expireTime)) / 1000 > 1200) { 
                        _db.ref(`groups/${_currG}/timers/${id}_ch${cNum}`).remove(); 
                    }
                } else if(dot) { dot.className = "status-dot"; }
            }

            if (aliveCh !== null && !_hasAutoSwitched[id] && !isFocusing) {
                _selectedCh[id] = aliveCh;
                currentCh = aliveCh;
                _hasAutoSwitched[id] = true;
                for(let i=1; i<=maxCh; i++) {
                    const btn = document.getElementById(`btn-ch-${id}-${i}`);
                    if (btn) btn.classList.toggle('active', i === aliveCh);
                }
            }
            if (aliveCh === null) _hasAutoSwitched[id] = false;

            const t = _fbD[`${id}_ch${currentCh}`], tmE = document.getElementById(`tmr-${id}`), stE = document.getElementById(`st-${id}`), lgE = document.getElementById(`log-${id}`);
            
            if (t && tmE) {
                const r = Math.floor((t.expireTime - now) / 1000), curStage = t.stage || 0, isAlive = r <= 0;
                lgE.innerText = `CH ${currentCh}: By ${t.user || 'Unknown'} (${t.time || '--:--'})`;
                
                [1, 2, 3, 4, 5].forEach(num => {
                    const sBtn = document.getElementById(`btn-stg-${id}-${num}`);
                    if (sBtn) {
                        sBtn.className = `stage-btn ${!_isE ? "btn-locked" : ""} ${curStage === num ? 'active-' + num : ''}`;
                    }
                });

                const spawnedBtn = document.getElementById(`btn-spawned-${id}`);

                if (r > 0) {
                    let h=Math.floor(r/3600), m=Math.floor((r%3600)/60), s=r%60;
                    tmE.innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    tmE.className = "text-xl text-yellow-400 font-mono";
                    stE.innerText = curStage > 0 ? `CH ${currentCh} - P${curStage}` : `CH ${currentCh} - COUNTING...`; stE.className = "text-[9px] text-gray-500 font-black mt-0.5 uppercase";
                    const elapsedEl2 = document.getElementById(`elapsed-${id}`);
                    if (elapsedEl2) elapsedEl2.classList.add('hidden');
                    if (spawnedBtn) { spawnedBtn.classList.toggle('btn-locked', !_isE); spawnedBtn.classList.remove('is-spawned'); spawnedBtn.innerText = '🎯 เกิดแล้ว!'; }
                } else {
                    // Auto-set to P1 when countdown finishes and no stage set yet
                    if (curStage === 0 && !t._autoP1) {
                        t._autoP1 = true;
                        _db.ref(`groups/${_currG}/timers/${id}_ch${currentCh}`).update({ stage: 1, last_update: now });
                    }
                    const displayStage = curStage || 1;
                    const elapsed = Math.floor((now - t.expireTime) / 1000);
                    const eH = Math.floor(elapsed / 3600), eM = Math.floor((elapsed % 3600) / 60), eS = elapsed % 60;
                    const elapsedStr = eH > 0 ? `${eH}:${eM.toString().padStart(2,'0')}:${eS.toString().padStart(2,'0')}` : `${eM}:${eS.toString().padStart(2,'0')}`;
                    const elapsedEl = document.getElementById(`elapsed-${id}`);
                    if (elapsedEl) { elapsedEl.innerText = `⏱ ผ่านไปแล้ว ${elapsedStr}`; elapsedEl.classList.remove('hidden'); }
                    tmE.innerText = `CH ${currentCh} ALIVE! ⚔️`; tmE.className = "text-lg text-event-orange font-bold animate-pulse";
                    if (t.spawned) {
                        stE.innerText = `เกิดแล้ว! โดย ${t.spawned_by || '???'} ⚔️`; stE.className = "text-[9px] text-red-400 font-black mt-0.5 uppercase";
                        if (spawnedBtn) { spawnedBtn.classList.remove('btn-locked'); spawnedBtn.classList.add('is-spawned'); spawnedBtn.innerText = `🔴 เกิดแล้ว! (${t.spawned_by})`; }
                    } else {
                        stE.innerText = displayStage === 5 ? "บอสเกิดแล้ว! ⚔️" : `ตีมอน! (P${displayStage})`; stE.className = "text-[9px] text-event-orange font-black mt-0.5 uppercase";
                        if (spawnedBtn) { spawnedBtn.classList.toggle('btn-locked', !_isE); spawnedBtn.classList.remove('is-spawned'); spawnedBtn.innerText = '🎯 เกิดแล้ว!'; }
                    }
                    if (!t.notified && _isE) { 
                        _db.ref(`groups/${_currG}/timers/${id}_ch${currentCh}`).update({ notified: true }); 
                        _post(id, "ALIVE", currentCh); 
                    }
                }
            } else if (tmE) {
                tmE.innerText = "READY"; tmE.className = "text-xl text-yellow-400 font-mono";
                stE.innerText = `CH ${currentCh} - Ready`; stE.className = "text-[9px] text-green-500 font-black mt-0.5 uppercase";
                const elapsedEl3 = document.getElementById(`elapsed-${id}`);
                if (elapsedEl3) elapsedEl3.classList.add('hidden');
                lgE.innerText = `CH ${currentCh}: No Data`;
                [1, 2, 3, 4, 5].forEach(num => {
                    const sBtn = document.getElementById(`btn-stg-${id}-${num}`);
                    if (sBtn) sBtn.className = `stage-btn ${!_isE ? 'btn-locked' : ''}`;
                });
                const spawnedBtn2 = document.getElementById(`btn-spawned-${id}`);
                if (spawnedBtn2) { spawnedBtn2.classList.toggle('btn-locked', !_isE); spawnedBtn2.classList.remove('is-spawned'); spawnedBtn2.innerText = '🎯 เกิดแล้ว!'; }
            }
        }

        function _loop() {
            setInterval(() => {
                const now = Date.now() + _srvOfst, epCounts = { all: 0 };
                const aliveItems = [];
                _bsData.forEach(b => {
                    _updT(b.id);
                    const card = document.getElementById(`card-${b.id}`), maxCh = (b.ep === 13 || b.ep === "13") ? 5 : 3;
                    let hasAnyAlive = false;
                    for(let cNum=1; cNum<=maxCh; cNum++) {
                        const timer = _fbD[`${b.id}_ch${cNum}`];
                        if (timer && (timer.expireTime - now) <= 0) {
                            hasAnyAlive = true;
                            const stg = timer.stage || 0;
                            const spawned = timer.spawned;
                            aliveItems.push({ name: b.name, img: b.img, ep: b.ep, lv: b.lv, map_ext: b.map_ext, ch: cNum, stage: stg, spawned: spawned, spawned_by: timer.spawned_by, id: b.id, expireTime: timer.expireTime });
                        }
                    }
                    if(card) card.classList.toggle('alive-glow', hasAnyAlive);
                    if(hasAnyAlive) { epCounts.all++; if(b.ep) epCounts[b.ep] = (epCounts[b.ep] || 0) + 1; }
                });
                document.querySelectorAll('.ep-badge').forEach(bg => {
                    const epKey = bg.id.replace('badge-', ''), count = epCounts[epKey] || 0;
                    bg.innerText = count; bg.classList.toggle('hidden', count === 0);
                });
                _updateAlivePanel(aliveItems);
            }, 1000);
        }

        function _updateAlivePanel(items) {
            const list = document.getElementById('alive-list');
            const badge = document.getElementById('alive-count-badge');
            if (items.length === 0) {
                list.innerHTML = '<div class="no-alive">ไม่มีบอส ALIVE</div>';
                badge.classList.add('hidden');
                return;
            }
            badge.innerText = items.length;
            badge.classList.remove('hidden');
            // Sort: spawned first, then by stage descending (BOSS→P4→P3→P2→P1)
            items.sort((a, b) => {
                const aPri = a.spawned ? 100 : (a.stage || 0);
                const bPri = b.spawned ? 100 : (b.stage || 0);
                return bPri - aPri;
            });
            const now = Date.now() + _srvOfst;
            list.innerHTML = items.map(it => {
                const stLabel = it.spawned ? `🔴 เกิดแล้ว!` : (it.stage > 0 ? `P${it.stage}` : '⚔️ ALIVE');
                const elapsed = Math.max(0, Math.floor((now - it.expireTime) / 1000));
                const eH = Math.floor(elapsed / 3600), eM = Math.floor((elapsed % 3600) / 60), eS = elapsed % 60;
                const elapsedStr = eH > 0 ? `${eH}:${eM.toString().padStart(2,'0')}:${eS.toString().padStart(2,'0')}` : `${eM}:${eS.toString().padStart(2,'0')}`;
                const highStage = (it.stage >= 4 || it.spawned) ? 'high-stage' : '';
                return `<div class="alive-item ${highStage}" onclick="_scrollToCard('${it.id}')">
                    <img src="${it.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="info">
                        <div class="boss-name">${it.name}</div>
                        <div class="boss-detail">${it.map_ext} • CH${it.ch} • ${stLabel} • ⏱${elapsedStr}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function _chk(id, m) {
            if (!_isE) return;
            const now = Date.now() + _srvOfst;

            const ch = _selectedCh[id] || 1;
            const existing = _fbD[`${id}_ch${ch}`];
            if (existing && existing.expireTime > now) {
                const b = _bsData.find(x => x.id === id);
                if (!confirm(`⚠️ บอส [${b.name}] CH ${ch} กำลังนับถอยหลังอยู่\nต้องการตั้งเวลาใหม่ทับของเดิมใช่หรือไม่?`)) return;
            }

            const n = localStorage.getItem('tos_uret_name'), b = _bsData.find(x=>x.id===id);
            const timeStr = new Date(now).toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
            
            _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).set({ 
                expireTime: now+(m*60*1000), 
                user: n, 
                time: timeStr, 
                notified: false, 
                ch: ch, 
                stage: 0 
            });
            
            _db.ref(`groups/${_currG}/logs`).push({ 
                bossName: b.name, ch: ch, user: n, time: timeStr, timestamp: now 
            });
        }

        function _mchk(id) { const v = document.getElementById(`in-${id}`).value; if(v){ _chk(id, parseFloat(v)); document.getElementById(`in-${id}`).value=''; } }
        
        function _rst(id) {
            if (!_isE) return;
            const ch = _selectedCh[id] || 1;

            if(confirm(`Reset CH ${ch}?`)) {
                _db.ref(`groups/${_currG}/timers/${id}_ch${ch}`).remove().then(() => {
                    _post(id, "RESET", ch);
                });
            }
        }

        function _pin(id) { const i = _pnBs.indexOf(id); i>-1 ? _pnBs.splice(i,1) : _pnBs.push(id); localStorage.setItem('tos_pinned_bosses', JSON.stringify(_pnBs)); _rend(); }
        
        function _save() {
            let g = document.getElementById('_grp').value, n = document.getElementById('_usr').value.trim();
            if (n === "/testadmin") { 
                g = "test_server"; 
                n = "Admin_Tester"; 

            }
            if (g && n) { localStorage.setItem('tos_group_name', g); localStorage.setItem('tos_uret_name', n); localStorage.setItem('tos_locked', 'true'); location.reload(); }
        }
        function _logout() { 
            if(confirm("Logout Profile?")) { 
                localStorage.removeItem('tos_group_name');
                localStorage.removeItem('tos_uret_name');
                localStorage.removeItem('tos_locked');
                location.reload(); 
            }
        }
        async function _post(id, ty, ch) {
            const g = localStorage.getItem('tos_group_name'), w = _webhooks[g]; if (!w) return;
            const role_ids = { "giltine": "1477963807245602837", "austeja": "1477969803967725648", "saule": "1477969920456265748", "zemyna": "1477970066338349227", "laima": "1477970107350122557", "vaivora": "1477970160492089481", "ausirine": "1477970230734098432", "vakarine": "1477970281862664242" };
            const b = _bsData.find(x => x.id === id), u = localStorage.getItem('tos_uret_name'), rId = role_ids[g] || "";

            const nowServer = Date.now() + _srvOfst, nowTH = new Date(nowServer).toLocaleTimeString('th-TH', { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const mapLoc = `${b.map}${b.map_ext ? ' (' + b.map_ext + ')' : ''}`;

        function _scrollToCard(id) {
            const card = document.getElementById('card-' + id);

            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.classList.remove('highlight-flash');

        // ===== Group Chat =====
        let _chatOpen = false, _chatListener = null, _chatUnread = 0, _chatLastSeen = 0;

        function _toggleChat() {
            const panel = document.getElementById('chat-panel');
            _chatOpen = !_chatOpen;
            panel.classList.toggle('minimized', !_chatOpen);
            document.getElementById('chat-toggle-icon').innerText = _chatOpen ? '▼' : '▲';
            if (_chatOpen) {
                _chatUnread = 0;
                _updateChatBadge();
                const msgs = document.getElementById('chat-messages');
                msgs.scrollTop = msgs.scrollHeight;
            }
        }

        function _updateChatBadge() {
            const badge = document.getElementById('chat-badge');
            if (_chatUnread > 0 && !_chatOpen) {
                badge.style.display = 'flex';
                badge.innerText = _chatUnread > 99 ? '99+' : _chatUnread;
            } else {
                badge.style.display = 'none';
            }
        }

        function _initChat() {
            if (_chatListener) _chatListener();
            if (!_currG) return;
            const chatRef = _db.ref(`groups/${_currG}/chat`).orderByChild('ts').limitToLast(50);
            _chatListener = chatRef.on('value', snap => {
                const data = snap.val();
                const container = document.getElementById('chat-messages');
                const myName = localStorage.getItem('tos_uret_name') || '';
                if (!data) { container.innerHTML = '<div class="chat-no-msg">ยังไม่มีข้อความ</div>'; return; }
                const msgs = Object.values(data).sort((a, b) => a.ts - b.ts);
                let newCount = 0;
                msgs.forEach(m => { if (m.ts > _chatLastSeen && m.user !== myName) newCount++; });
                if (!_chatOpen) _chatUnread += newCount;
                if (msgs.length > 0) _chatLastSeen = msgs[msgs.length - 1].ts;
                _updateChatBadge();

                container.innerHTML = msgs.map(m => {
                    const isSelf = m.user === myName;
                    const t = new Date(m.ts).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    const safeText = (m.text || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const safeUser = (m.user || '???').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    return `<div class="chat-msg ${isSelf ? 'self' : 'other'}"><span class="msg-user">${safeUser}</span><span class="msg-time">${t}</span><div class="msg-text">${safeText}</div></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            });

            // Show/hide input based on login
            document.getElementById('chat-input-area').style.display = _isE ? 'flex' : 'none';
        }

        function _sendChat() {
            if (!_isE || !_currG) return;
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            const user = localStorage.getItem('tos_uret_name') || 'Unknown';
            const now = Date.now() + _srvOfst;
            _db.ref(`groups/${_currG}/chat`).push({ user: user, text: text, ts: now });
            input.value = '';

            // Cleanup: keep only last 100 messages
            _db.ref(`groups/${_currG}/chat`).orderByChild('ts').once('value', snap => {
                const all = snap.val();
                if (!all) return;
                const keys = Object.keys(all);
                if (keys.length > 100) {
                    const sorted = keys.map(k => ({ key: k, ts: all[k].ts })).sort((a, b) => a.ts - b.ts);
                    const toRemove = sorted.slice(0, keys.length - 100);
                    const updates = {};
                    toRemove.forEach(item => { updates[item.key] = null; });
                    _db.ref(`groups/${_currG}/chat`).update(updates);
                }
            });
        }

        window.onscroll = function() { const btn = document.getElementById("backToTop"); if (document.documentElement.scrollTop > 300) btn.classList.add("show"); else btn.classList.remove("show"); };
        _init();
    </script>
</body>
</html>
